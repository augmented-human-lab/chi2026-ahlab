<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Augmented Human Lab @ CHI 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:        #1a1814;
      --ink-light:  #4a4640;
      --ink-faint:  #8a857e;
      --paper:      #f7f5f1;
      --paper-warm: #ede9e2;
      --rule:       #d5cfc5;
      --accent:     #c0392b;        /* CHI red */
      --accent-dim: rgba(192,57,43,0.08);
      --mono:       'DM Mono', monospace;
      --serif:      'EB Garamond', Georgia, serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--serif);
      font-size: 18px;
      line-height: 1.7;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px;
      height: 60px;
      background: rgba(247,245,241,0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--rule);
    }

    .nav-logo {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
    }

    .nav-links {
      display: flex; gap: 32px; list-style: none;
    }

    .nav-links a {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-light);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--accent); }

    /* ── HERO ── */
    .hero {
      padding-top: 60px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .hero-header {
      padding: 64px 48px 40px;
      border-bottom: 1px solid var(--rule);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: end;
    }

    .event-tag {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(2.4rem, 5vw, 3.8rem);
      font-weight: 500;
      line-height: 1.12;
      letter-spacing: -0.01em;
    }

    h1 em {
      font-style: italic;
      color: var(--ink-light);
    }

    .hero-meta {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-bottom: 4px;
    }

    .meta-row {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .meta-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-faint);
      min-width: 64px;
    }

    .meta-value {
      font-size: 15px;
      color: var(--ink-light);
    }

    /* ── VIDEO PLACEHOLDER ── */
    .video-section {
      flex: 1;
      padding: 0 48px;
      display: flex;
      flex-direction: column;
    }

    .video-wrapper {
      margin-top: 40px;
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: var(--paper-warm);
      border: 1px solid var(--rule);
      overflow: hidden;
    }

    .video-placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px;
    }

    .play-btn {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 1.5px solid var(--rule);
      background: rgba(247,245,241,0.7);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .play-btn:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .play-btn svg { margin-left: 4px; }

    .video-caption {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    /* subtle grid texture on placeholder */
    .video-wrapper::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(var(--rule) 1px, transparent 1px),
        linear-gradient(90deg, var(--rule) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.35;
    }

    .video-label {
      position: absolute;
      top: 20px; left: 24px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    /* ── SECTION SHARED ── */
    section {
      padding: 80px 48px;
      border-top: 1px solid var(--rule);
    }

    .section-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--rule);
    }

    h2 {
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 500;
      line-height: 1.2;
      margin-bottom: 20px;
    }

    p {
      max-width: 64ch;
      color: var(--ink-light);
      font-size: 17px;
    }

    /* ── ABOUT ── */
    .about-grid {
      display: grid;
      grid-template-columns: 5fr 4fr;
      gap: 64px;
      align-items: start;
    }

    .about-aside {
      padding-top: 8px;
    }

    .stat-block {
      border-top: 1px solid var(--rule);
      padding: 20px 0;
    }

    .stat-block:last-child { border-bottom: 1px solid var(--rule); }

    .stat-number {
      font-size: 2.4rem;
      font-weight: 400;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-desc {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--ink-faint);
    }

    /* ── PAPERS ── */
    .papers-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .paper-item {
      display: grid;
      grid-template-columns: 40px 1fr;
      gap: 24px;
      padding: 28px 0;
      border-top: 1px solid var(--rule);
      text-decoration: none;
      color: inherit;
      transition: background 0.15s;
    }

    .paper-item:last-child { border-bottom: 1px solid var(--rule); }

    .paper-item:hover { background: var(--accent-dim); margin: 0 -48px; padding-left: 48px; padding-right: 48px; }

    .paper-num {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-faint);
      padding-top: 4px;
    }

    .paper-title {
      font-size: 17px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .paper-authors {
      font-size: 14px;
      color: var(--ink-faint);
      font-style: italic;
    }

    .paper-tag {
      display: inline-block;
      margin-top: 8px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 2px 8px;
      border-radius: 2px;
    }

    /* ── TEAM ── */
    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 32px 24px;
    }

    .team-member { }

    .team-avatar {
      width: 100%;
      aspect-ratio: 1;
      background: var(--paper-warm);
      border: 1px solid var(--rule);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 22px;
      color: var(--ink-faint);
    }

    .team-name {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 2px;
    }

    .team-role {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--ink-faint);
      text-transform: uppercase;
    }

    /* ── SCHEDULE ── */
    .schedule-list {
      display: flex;
      flex-direction: column;
    }

    .schedule-row {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 32px;
      padding: 20px 0;
      border-top: 1px solid var(--rule);
      align-items: baseline;
    }

    .schedule-row:last-child { border-bottom: 1px solid var(--rule); }

    .sched-date {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--ink-faint);
    }

    .sched-title { font-size: 16px; }

    .sched-where {
      font-size: 13px;
      color: var(--ink-faint);
      font-style: italic;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--rule);
      padding: 40px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-logo {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    .footer-right {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-faint);
      text-align: right;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-header, .video-section { animation: fadeUp 0.7s ease both; }
    .video-section { animation-delay: 0.15s; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      nav { padding: 0 20px; }
      .nav-links { gap: 16px; }
      .hero-header { grid-template-columns: 1fr; padding: 40px 20px 28px; }
      .video-section { padding: 0 20px; }
      section { padding: 56px 20px; }
      .about-grid { grid-template-columns: 1fr; }
      footer { flex-direction: column; gap: 12px; text-align: center; }
      .paper-item:hover { margin: 0 -20px; padding-left: 20px; padding-right: 20px; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a class="nav-logo" href="#">AH Lab</a>
    <span style="font-family:var(--mono);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-faint);">April 12–18, 2026 &mdash; Barcelona</span>
  </nav>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-header">
      <div>
        <div class="event-tag">CHI 2026 &mdash; Barcelona</div>
        <h1>Augmented<br><em>Human Lab</em></h1>
      </div>
      
    </div>

    <!-- VIDEO -->
    <div class="video-section">
      <div class="video-wrapper">
        <div class="video-label">Lab Overview</div>
        <div class="video-placeholder">
          <div class="play-btn">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <polygon points="5,3 19,12 5,21" fill="var(--ink-light)" stroke="none"/>
            </svg>
          </div>
          <span class="video-caption">Video placeholder &mdash; replace with embed or &lt;video&gt; tag</span>
        </div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-logo">Augmented Human Lab &mdash; NUS</div>
    <div class="footer-right">
      CHI 2026, Barcelona<br>
      <a href="https://ahlab.org" style="color:var(--ink-faint); text-decoration:none;">ahlab.org</a>
    </div>
  </footer>

</body>
</html>
